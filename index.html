<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tupe's</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0b0d;
            --surface: #0f1114;
            --muted: #9aa0a6;
            --gold1: #d4af37;
            --gold2: #ffcc66;
            --accent: linear-gradient(90deg, var(--gold1), var(--gold2));
            --glass: rgba(255, 255, 255, 0.03);
            --card-radius: 20px;
            --shadow: 0 15px 35px rgba(2, 6, 23, 0.6);
            --maxw: 1280px;
            --gap: 24px;
            --ff-heading: 'Playfair Display', serif;
            --ff-ui: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            --orange: #ff9800;
            --green: #4CAF50;
        }

        html, body {
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(1200px 600px at 10% 10%, rgba(212, 175, 55, 0.05), transparent 6%),
                        radial-gradient(1000px 500px at 95% 90%, rgba(255, 204, 102, 0.03), transparent 8%),
                        var(--bg);
            color: #e8e6e3;
            font-family: var(--ff-ui);
            padding: 20px 16px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.png') no-repeat center center/cover;
            filter: grayscale(100%);
            opacity: 0.3;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: var(--maxw);
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ========= CAFE HEADER - ONLY LOGO SECTION, NO NAME ========= */
        .cafe-header {
            background: rgba(15, 17, 20, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 16px 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* Logo section only - centered on mobile, flex on desktop */
        .logo-section {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .logo-img {
            height: 60px;
            width: auto;
            max-width: 220px;
            display: block;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
            transition: transform 0.2s ease;
        }

        .logo-img:hover {
            transform: scale(1.02);
        }

        /* ========= CENTERED INFO ROW: Mobile + Veg/Nonveg ========= */
        .info-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
            margin-top: 12px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.25);
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
        }

        .mobile-numbers {
            background: rgba(0,0,0,0.5);
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #fff;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 0.5px;
        }

        .mobile-numbers::before {
            content: "📞 ";
            font-weight: normal;
        }

        .veg-nonveg {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.4);
            padding: 6px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .veg, .nonveg {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .veg { color: #81c784; }
        .nonveg { color: #ff8a7a; }

        .symbol {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }
        .veg .symbol { background: #4caf50; border: 2px solid #2e7d32; }
        .nonveg .symbol { background: #f44336; border: 2px solid #b71c1c; }

        /* ========= SEARCH & TABS (bigger search bar) ========= */
        .menu-head {
            background: rgba(15, 17, 20, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 12px 20px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .search {
            background: var(--glass);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
            width: 100%;
        }
        .search:focus-within {
            border-color: var(--gold1);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
        }
        .search svg {
            flex-shrink: 0;
        }
        .search input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.1rem;
            width: 100%;
            font-weight: 400;
        }
        .search input::placeholder {
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
        }

        .tabs-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            padding: 6px 0;
        }

        .tab {
            padding: 10px 22px;
            border-radius: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .tab.active {
            background: linear-gradient(95deg, var(--gold1), var(--gold2));
            color: #0b0b0d;
            border: none;
            font-weight: 700;
            box-shadow: 0 6px 16px rgba(212,175,55,0.2);
        }
        .tab:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
            transform: translateY(-1px);
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 8px;
        }

        .card {
            background: linear-gradient(145deg, rgba(20,22,27,0.85), rgba(12,14,18,0.95));
            border-radius: 24px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.25s;
            backdrop-filter: blur(2px);
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(212,175,55,0.4);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .thumb {
            width: 130px;
            height: 130px;
            border-radius: 18px;
            overflow: hidden;
            flex-shrink: 0;
            background: #1a1c22;
        }
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .card:hover .thumb img {
            transform: scale(1.05);
        }
        .card-info {
            flex: 1;
        }
        .dish {
            font-family: var(--ff-heading);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .desc {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pill {
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--gold2);
            letter-spacing: -0.3px;
        }
        .btn-primary {
            background: linear-gradient(95deg, var(--gold1), var(--gold2));
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            color: #0b0b0d;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .btn-primary:hover {
            transform: scale(0.98);
            filter: brightness(1.05);
        }

        /* Location section */
        .location-link-section {
            background: rgba(15, 17, 20, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.15);
        }
        .location-link-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .location-link-header h3 {
            font-family: var(--ff-heading);
            color: var(--gold2);
        }
        .map-link {
            background: linear-gradient(90deg, var(--gold1), var(--gold2));
            padding: 12px 28px;
            border-radius: 60px;
            color: #0b0b0d;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* Cart styles */
        .cart-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
        }
        .cart-button {
            background: linear-gradient(135deg, var(--gold1), var(--gold2));
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: none;
            cursor: pointer;
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #e74c3c;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
        }
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            padding: 20px;
        }
        .cart-modal.open {
            opacity: 1;
            visibility: visible;
        }
        .cart-content {
            background: var(--surface);
            max-width: 550px;
            width: 100%;
            border-radius: 32px;
            padding: 24px;
            max-height: 85vh;
            overflow-y: auto;
        }

        /* responsive */
        @media (min-width: 640px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .search input {
                font-size: 1.1rem;
            }
        }
        @media (min-width: 1024px) {
            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 550px) {
            .veg-nonveg, .mobile-numbers {
                font-size: 0.7rem;
                padding: 4px 12px;
            }
            .info-center {
                gap: 12px;
            }
            .tab {
                padding: 6px 14px;
                font-size: 0.7rem;
            }
            .logo-img {
                height: 50px;
            }
            .thumb {
                width: 100px;
                height: 100px;
            }
        }

        .delivery-options, .cart-item, .btn-whatsapp, .btn-clear {
            /* consistent style */
        }
        .btn-whatsapp {
            background: #25D366;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            cursor: pointer;
        }
        .form-input {
            background: rgba(255,255,255,0.07);
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            color: white;
            width: 100%;
            margin-bottom: 12px;
        }
        .option-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 40px;
            color: var(--muted);
            cursor: pointer;
        }
        .option-btn.active {
            background: var(--gold1);
            color: #0b0b0d;
            border-color: var(--gold1);
        }
        .close-cart {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--muted);
            cursor: pointer;
        }
    </style>
</head>

        {id:25,cat:"Chicken Special",name:"Butter Chicken",price:"260/-",desc:"Creamy butter chicken",tags:["NonVeg"],img:"img/butter_chicken.jpeg"},
        {id:26,cat:"Non-Veg Gravy",name:"Non-Veg Gravy",price:"140/-",desc:"Signature gravy",tags:["NonVeg"],img:"img/nonveg_gravy.jpeg"},
        {id:27,cat:"Drinks",name:"Masala Tak",price:"20/-",desc:"Spiced buttermilk",tags:["Veg"],img:"img/masala_tak.jpeg"},
        {id:28,cat:"Drinks",name:"Cold Drinks",price:"25/-",desc:"Sprite/Coke",tags:["Veg"],img:"img/cold_drinks.jpeg"},
        {id:29,cat:"Starters",name:"Onion Pakoda",price:"150/-",desc:"Crispy fritters",tags:["Veg"],img:"img/onion_pakoda.jpeg"},
        {id:30,cat:"Main Course",name:"Palak Paneer",price:"200/-",desc:"Spinach paneer",tags:["Veg"],img:"img/palak_paneer.jpeg"}
    ];
    const fullData = [...menuData];

    const categories = [
        { key:"all", label:"सर्व पदार्थ (All)" },
        { key:"Starters", label:"स्टार्टर्स" },
        { key:"Rice", label:"राईस & बिर्याणी" },
        { key:"Main Course", label:"मेन कोर्स (व्हेज)" },
        { key:"Roti", label:"रोटी & भाकरी" },
        { key:"Non-Veg Starters", label:"नॉन-व्हेज स्टार्टर्स" },
        { key:"Egg Special", label:"अंडा स्पेशल" },
        { key:"Mutton Special", label:"मटण स्पेशल" },
        { key:"Chicken Special", label:"चिकन स्पेशल" },
        { key:"Non-Veg Gravy", label:"नॉन-व्हेज ग्रेव्ही" },
        { key:"Drinks", label:"पेय (Drinks)" }
    ];

    let cart = [];
    let deliveryType = 'restaurant';

    function renderTabs() {
        const container = document.getElementById('tabContainer');
        if(!container) return;
        container.innerHTML = categories.map(cat => `<button class="tab ${cat.key === 'all' ? 'active' : ''}" data-cat="${cat.key}">${cat.label}</button>`).join('');
        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                filterByCategory(btn.dataset.cat);
            });
        });
    }

    function renderMenu(items) {
        const grid = document.getElementById('menuGrid');
        if(!items.length) { grid.innerHTML = '<div style="text-align:center; padding:40px;">No items found</div>'; return; }
        grid.innerHTML = items.map(item => `
            <div class="card">
                <div class="card-header">
                    <div class="thumb"><img src="${item.img}" alt="${item.name}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22130%22%20height%3D%22130%22%20viewBox%3D%220%200%20130%20130%22%3E%3Crect%20width%3D%22130%22%20height%3D%22130%22%20fill%3D%22%23222%22%2F%3E%3Ctext%20x%3D%2265%22%20y%3D%2265%22%20text-anchor%3D%22middle%22%20fill%3D%22%23999%22%3ENo%20img%3C%2Ftext%3E%3C%2Fsvg%3E'"></div>
                    <div class="card-info">
                        <h3 class="dish">${item.name}</h3>
                        <p class="desc">${item.desc}</p>
                        <div class="tags">${item.tags.map(t=>`<span class="pill">${t}</span>`).join('')}</div>
                    </div>
                </div>
                <div class="card-footer">
                    <div class="price">${item.price}</div>
                    <button class="btn-primary" data-item='${JSON.stringify(item)}'>Add to Cart</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.btn-primary').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const item = JSON.parse(btn.getAttribute('data-item'));
                addToCartLogic(item, btn);
            });
        });
    }

    function filterByCategory(cat) {
        if(cat === 'all') renderMenu(fullData);
        else renderMenu(fullData.filter(i => i.cat === cat));
    }
    function searchItems(query) {
        if(!query.trim()) return renderMenu(fullData);
        const filtered = fullData.filter(i => i.name.toLowerCase().includes(query.toLowerCase()) || i.desc.toLowerCase().includes(query.toLowerCase()));
        renderMenu(filtered);
    }

    function addToCartLogic(item, button) {
        const existing = cart.find(i => i.id === item.id);
        if(existing) existing.quantity += 1;
        else cart.push({ id: item.id, name: item.name, price: item.price, quantity: 1 });
        updateCartUI();
        button.innerText = '✓ Added';
        setTimeout(() => { button.innerText = 'Add to Cart'; }, 800);
    }
    function updateCartUI() {
        const totalItems = cart.reduce((s,i)=>s+i.quantity,0);
        document.getElementById('cartCount').innerText = totalItems;
        const cartItemsDiv = document.getElementById('cartItems');
        if(cart.length===0) { cartItemsDiv.innerHTML = '<div class="cart-empty">Cart is empty</div>'; document.getElementById('cartTotal').innerText = '₹0'; return; }
        let total=0;
        let html = '';
        cart.forEach(i => {
            const priceNum = parseInt(i.price.replace('₹',''));
            const itemTotal = priceNum * i.quantity;
            total += itemTotal;
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <div><strong>${i.name}</strong><div>${i.price}</div></div>
                        <div style="display:flex; gap:12px; align-items:center;">
                            <button class="qty-minus" data-id="${i.id}">-</button><span>${i.quantity}</span><button class="qty-plus" data-id="${i.id}">+</button>
                            <button class="remove-item" data-id="${i.id}">✖</button>
                        </div>
                    </div>`;
        });
        cartItemsDiv.innerHTML = html;
        document.getElementById('cartTotal').innerText = `₹${total}`;
        document.querySelectorAll('.qty-minus').forEach(btn => btn.addEventListener('click', () => updateQty(parseInt(btn.dataset.id), -1)));
        document.querySelectorAll('.qty-plus').forEach(btn => btn.addEventListener('click', () => updateQty(parseInt(btn.dataset.id), 1)));
        document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', () => { cart = cart.filter(i=>i.id !== parseInt(btn.dataset.id)); updateCartUI(); }));
    }
    function updateQty(id, delta) {
        const idx = cart.findIndex(i=>i.id===id);
        if(idx!==-1){
            cart[idx].quantity += delta;
            if(cart[idx].quantity<=0) cart.splice(idx,1);
            updateCartUI();
        }
    }
    function clearCart() { cart = []; updateCartUI(); }

    // Delivery logic
    document.getElementById('restaurantOption')?.addEventListener('click',()=>{
        deliveryType='restaurant';
        document.getElementById('restaurantForm').style.display='block';
        document.getElementById('homeDeliveryForm').style.display='none';
        document.getElementById('restaurantOption').classList.add('active');
        document.getElementById('homeDeliveryOption').classList.remove('active');
    });
    document.getElementById('homeDeliveryOption')?.addEventListener('click',()=>{
        deliveryType='home';
        document.getElementById('restaurantForm').style.display='none';
        document.getElementById('homeDeliveryForm').style.display='block';
        document.getElementById('homeDeliveryOption').classList.add('active');
        document.getElementById('restaurantOption').classList.remove('active');
    });
    document.getElementById('whatsappOrder')?.addEventListener('click',()=>{
        if(cart.length===0) return alert('Cart empty');
        let msg = "🍽️ *Tupe's Order* 🍽️\n";
        if(deliveryType==='restaurant'){
            let table = document.getElementById('tableNumber').value.trim();
            if(!table) return alert('Please enter table number');
            msg += `📍 Dine-in | Table: ${table}\n\n`;
        } else {
            let name = document.getElementById('customerName').value.trim();
            let mobile = document.getElementById('customerMobile').value.trim();
            let addr = document.getElementById('customerAddress').value.trim();
            if(!name || !mobile || !addr) return alert('Please fill all delivery details');
            msg += `🏠 Home Delivery\nName: ${name}\nMobile: ${mobile}\nAddress: ${addr}\n\n`;
        }
        msg += `*Items:*\n`;
        let total=0;
        cart.forEach(i=>{ let p=parseInt(i.price.replace('₹','')); let amt=p*i.quantity; total+=amt; msg+=`• ${i.name} x${i.quantity} = ₹${amt}\n`; });
        msg+=`\n*Total: ₹${total}*\nThank you!`;
        window.open(`https://wa.me/917588075353?text=${encodeURIComponent(msg)}`,'_blank');
    });
    document.getElementById('clearCart')?.addEventListener('click', clearCart);
    document.getElementById('addAnotherItem')?.addEventListener('click',()=>{ document.getElementById('cartModal').classList.remove('open'); });
    document.getElementById('cartButton')?.addEventListener('click',()=>{ document.getElementById('cartModal').classList.add('open'); });
    document.getElementById('closeCart')?.addEventListener('click',()=>{ document.getElementById('cartModal').classList.remove('open'); });
    document.getElementById('search').addEventListener('input',(e)=>searchItems(e.target.value));

    renderTabs();
    renderMenu(fullData);
    updateCartUI();
    document.getElementById('restaurantForm').style.display='block';
    document.getElementById('homeDeliveryForm').style.display='none';
</script>
</body>
</html>
